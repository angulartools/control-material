<div class="color-dot" [style.background-color]="colorHex()"></div>

@if (isVisible()) {
  <div class="picker-inner">
    <chrome-picker [control]="colorControl">
      <div class="buttons">
        <button class="m-1 p-2" type="button" style="width: 100px;" mat-stroked-button color="accent"
          (click)="discardClick($event)">
          <i class="fa-regular fa-xmark mr-1"></i>
          {{'CANCELAR' | translate}}
        </button>
        <button class="m-1 p-2" type="button" style="width: 100px;" mat-raised-button color="primary"
          (click)="applyClick($event)">
          <i class="fa-regular fa-check mr-1"></i>
          {{'OK' | translate}}
        </button>
      </div>
    </chrome-picker>
  </div>
}
